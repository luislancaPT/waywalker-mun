<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test WayWalker</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
        }
        button {
            padding: 20px 40px;
            font-size: 18px;
            margin: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:active {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>🧪 WayWalker Test</h1>
    <p>Teste se JavaScript funciona no seu iPhone</p>
    
    <button id="testBtn">Clique Aqui para Testar</button>
    
    <div class="result" id="result">
        Aguardando clique...
    </div>

    <script>
        console.log('✅ JavaScript carregado');
        
        document.getElementById('testBtn').addEventListener('click', function() {
            console.log('✅ Botão clicado!');
            document.getElementById('result').innerHTML = '<strong style="color: green;">✅ FUNCIONA!</strong><br>JavaScript está OK no seu iPhone!';
            document.getElementById('result').style.background = '#d4edda';
        });
        
        // Log adicional
        window.addEventListener('load', function() {
            console.log('✅ Página carregada completamente');
        });
    </script>
</body>
</html>
