    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 5px 10px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .recording-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .recording-controls button {
            flex: 1;
        }

        .video-preview {
            width: 100%;
            max-height: 400px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .processing-steps {
            margin: 20px 0;
        }

        .processing-step {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .processing-step.pending {
            background: #f5f5f5;
            color: #999;
        }

        .processing-step.active {
            background: #e0e7ff;
            color: #667eea;
        }

        .processing-step.done {
            background: #d1fae5;
            color: #10b981;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .manifesto {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            line-height: 1.8;
        }

        .manifesto-image {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .metadata-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .metadata-item strong {
            display: block;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-purple { background: #e0d4f7; color: #764ba2; }
        .badge-blue { background: #dbeafe; color: #3b82f6; }
        .badge-green { background: #d1fae5; color: #10b981; }
        .badge-yellow { background: #fef3c7; color: #f59e0b; }
        .badge-red { background: #fee2e2; color: #ef4444; }
        .badge-orange { background: #ffedd5; color: #f97316; }
        .badge-pink { background: #fce7f3; color: #ec4899; }
        .badge-indigo { background: #e0e7ff; color: #6366f1; }

        .profile-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .profile-card-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-card-emoji {
            font-size: 4rem;
            line-height: 1;
        }

        .profile-card-title h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .profile-card-section {
            margin-bottom: 25px;
        }

        .profile-card-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .profile-card-section p {
            color: #555;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .success-links {
            display: grid;
            gap: 15px;
            margin: 25px 0;
        }

        .success-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
        }

        .success-link:hover {
            background: #e0e7ff;
            transform: translateX(5px);
        }

        .success-link .icon {
            font-size: 2rem;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #e0e7ff;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .profile-card-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>

        // ========================================
        // HELPER FUNCTIONS
        // ========================================
        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function exportAnalysisJSON(analysisData) {
            const jsonString = JSON.stringify(analysisData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const fileName = `waywalker_${analysisData.config.profileName.substring(0, 20)}_${analysisData.config.spaceName}_${new Date().toISOString().split('T')[0]}.json`;
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            
            URL.revokeObjectURL(url);
        }

        // ========================================
        // MAIN APP COMPONENT
        // ========================================
        function WayWalkerApp() {
            const [step, setStep] = useState(() => {
                // Check if needs configuration
                if (needsConfiguration()) {
                    return 'settings';
                }
                return 'login';
            });
            const [language, setLanguage] = useState(localStorage.getItem('waywalker_language') || 'pt');
            const [user, setUser] = useState(null);
            const [config, setConfig] = useState(null);
            const [recording, setRecording] = useState(null);
            const [processing, setProcessing] = useState(null);
            const [urls, setUrls] = useState(null);

            const t = (key) => TRANSLATIONS[language][key] || key;

            useEffect(() => {
                localStorage.setItem('waywalker_language', language);
            }, [language]);

            const handleLanguageChange = (e) => {
                setLanguage(e.target.value);
            };
            
            const handleSettingsSave = () => {
                // Will reload page, so set to login
                setStep('login');
            };

            const handleLogin = (userData) => {
                setUser(userData);
                setStep('setup');
            };

            const handleStartRecording = () => {
                setStep('recording');
            };

            const handleRecordingComplete = (recordingData) => {
                setRecording(recordingData);
                setStep('processing');
            };

            const handleProcessingComplete = (processingData) => {
                setProcessing(processingData);
                setStep('review');
            };

            const handleExportJSON = () => {
                const analysisData = {
                    metadata: {
                        version: "2.0",
                        exportedAt: new Date().toISOString()
                    },
                    config,
                    recording,
                    processing,
                    urls: urls || { videoUrl: null, pdfUrl: null, mapUrl: null }
                };
                exportAnalysisJSON(analysisData);
            };

            const handlePublish = async (urls) => {
                setUrls(urls);
                setStep('success');
            };

            const handleNewAnalysis = () => {
                setStep('setup');
                setConfig(null);
                setRecording(null);
                setProcessing(null);
                setUrls(null);
            };

            return (
                <div className="container">
                    <div className="header">
                        <select 
                            className="language-selector" 
                            value={language} 
                            onChange={handleLanguageChange}
                        >
                            <option value="pt">🇵🇹 PT</option>
                            <option value="en">🇬🇧 EN</option>
                            <option value="es">🇪🇸 ES</option>
                        </select>
                        <h1>{t('appName')}</h1>
                        <p>{t('appSubtitle')}</p>
                    </div>

                    {step === 'settings' && <SettingsScreen onSave={handleSettingsSave} t={t} />}
                    {step === 'login' && <LoginScreen onLogin={handleLogin} t={t} />}
                    {step === 'setup' && <SetupScreen onNext={(cfg) => { setConfig(cfg); setStep('profileCard'); }} user={user} t={t} language={language} />}
                    {step === 'profileCard' && <ProfileCardScreen config={config} language={language} onContinue={handleStartRecording} onBack={() => setStep('setup')} t={t} />}
                    {step === 'recording' && <RecordingScreen config={config} onComplete={handleRecordingComplete} onBack={() => setStep('profileCard')} t={t} language={language} />}
                    {step === 'processing' && <ProcessingScreen recording={recording} config={config} onComplete={handleProcessingComplete} t={t} language={language} />}
                    {step === 'review' && <ReviewScreen processing={processing} config={config} onExport={handleExportJSON} onPublish={handlePublish} t={t} user={user} />}
                    {step === 'success' && <SuccessScreen urls={urls} onNewAnalysis={handleNewAnalysis} t={t} />}
                </div>
            );
        }

        function LoginScreen({ onLogin, t }) {
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                // Load Google Identity Services
                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.async = true;
                script.defer = true;
                document.body.appendChild(script);

                script.onload = () => {
                    window.google.accounts.id.initialize({
                        client_id: API_CONFIG.GOOGLE_CLIENT_ID,
                        callback: handleCredentialResponse
                    });
                };

                return () => {
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                };
            }, []);

            const handleCredentialResponse = (response) => {
                try {
                    // Decode JWT token
                    const payload = JSON.parse(atob(response.credential.split('.')[1]));
                    
                    const userData = {
                        email: payload.email,
                        name: payload.name,
                        id: payload.sub,
                        picture: payload.picture
                    };
                    
                    onLogin(userData);
                } catch (error) {
                    alert('Error during login: ' + error.message);
                    setIsLoading(false);
                }
            };

            const handleGoogleLogin = () => {
                setIsLoading(true);
                if (window.google) {
                    window.google.accounts.id.prompt();
                } else {
                    alert('Google Sign-In not loaded. Please refresh the page.');
                    setIsLoading(false);
                }
            };

            return (
                <div className="content">
                    <div style={{ textAlign: 'center', padding: '40px 0' }}>
                        <div style={{ fontSize: '5rem', marginBottom: '20px' }}>🗺️</div>
                        <h2 style={{ marginBottom: '10px' }}>WayWalker v2.0</h2>
                        <p style={{ color: '#666', marginBottom: '40px' }}>
                            Empathy Wayfinding Analysis Platform
                        </p>
                        <button 
                            className="btn btn-primary" 
                            onClick={handleGoogleLogin}
                            disabled={isLoading}
                        >
                            {isLoading ? '⏳ Loading...' : `🔐 ${t('login')}`}
                        </button>
                        <div id="g_id_onload"
                            data-client_id={API_CONFIG.GOOGLE_CLIENT_ID}
                            data-callback="handleCredentialResponse">
                        </div>
                    </div>
                </div>
            );
        }

        // ========================================
        // RECORDING SCREEN
        // ========================================
        function RecordingScreen({ config, onComplete, onBack, t, language }) {
            const [isRecording, setIsRecording] = useState(false);
            const [duration, setDuration] = useState(0);
            const [gpsPoints, setGpsPoints] = useState([]);
            const [transcription, setTranscription] = useState('');
            const videoRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            const intervalRef = useRef(null);
            const gpsIntervalRef = useRef(null);
            const recognitionRef = useRef(null);

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' }, 
                        audio: true 
                    });
                    
                    streamRef.current = stream;
                    videoRef.current.srcObject = stream;
                    
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            chunksRef.current.push(e.data);
                        }
                    };
                    
                    mediaRecorder.start();
                    setIsRecording(true);
                    
                    // Start speech recognition
                    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        const recognition = new SpeechRecognition();
                        
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = config.narrationLang || language;
                        
                        recognition.onresult = (event) => {
                            let interimTranscript = '';
                            let finalTranscript = '';
                            
                            for (let i = event.resultIndex; i < event.results.length; i++) {
                                const transcript = event.results[i][0].transcript;
                                if (event.results[i].isFinal) {
                                    finalTranscript += transcript + ' ';
                                } else {
                                    interimTranscript += transcript;
                                }
                            }
                            
                            if (finalTranscript) {
                                setTranscription(prev => prev + finalTranscript);
                            }
                        };
                        
                        recognition.onerror = (event) => {
                            console.log('Speech recognition error:', event.error);
                        };
                        
                        recognition.start();
                        recognitionRef.current = recognition;
                    }
                    
                    // Start timer
                    intervalRef.current = setInterval(() => {
                        setDuration(d => d + 1);
                    }, 1000);
                    
                    // Start GPS tracking
                    gpsIntervalRef.current = setInterval(() => {
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition((position) => {
                                setGpsPoints(points => [...points, {
                                    lat: position.coords.latitude,
                                    lng: position.coords.longitude,
                                    timestamp: Date.now()
                                }]);
                            });
                        }
                    }, 2000);
                    
                } catch (error) {
                    alert('Error accessing camera/microphone: ' + error.message);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    
                    mediaRecorderRef.current.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'video/webm' });
                        const videoUrl = URL.createObjectURL(blob);
                        
                        if (streamRef.current) {
                            streamRef.current.getTracks().forEach(track => track.stop());
                        }
                        
                        if (recognitionRef.current) {
                            recognitionRef.current.stop();
                        }
                        
                        clearInterval(intervalRef.current);
                        clearInterval(gpsIntervalRef.current);
                        
                        onComplete({
                            videoBlob: blob,
                            videoUrl,
                            duration,
                            gpsPoints,
                            audioTranscription: transcription || 'Nenhuma narração capturada. Por favor, fale durante a gravação descrevendo o que observa no espaço.',
                            recordedAt: new Date().toISOString()
                        });
                    };
                }
            };

            return (
                <div className="content">
                    <h2 style={{ marginBottom: '20px' }}>
                        {isRecording ? `🔴 ${t('recording')}` : '📹 Ready to Record'}
                    </h2>
                    
                    <video 
                        ref={videoRef} 
                        autoPlay 
                        muted 
                        playsInline
                        className="video-preview"
                    />
                    
                    <div className="stats">
                        <div className="stat-card">
                            <div className="value">{formatDuration(duration)}</div>
                            <div className="label">{t('duration')}</div>
                        </div>
                        <div className="stat-card">
                            <div className="value">{gpsPoints.length}</div>
                            <div className="label">{t('gpsPoints')}</div>
                        </div>
                    </div>
                    
                    {isRecording && transcription && (
                        <div style={{ 
                            background: '#f0f0f0', 
                            padding: '15px', 
                            borderRadius: '8px', 
                            marginBottom: '15px',
                            maxHeight: '100px',
                            overflow: 'auto',
                            fontSize: '0.9rem'
                        }}>
                            <strong>🎤 Transcrição:</strong> {transcription}
                        </div>
                    )}
                    
                    <div className="recording-controls">
                        {!isRecording ? (
                            <button className="btn btn-success" onClick={startRecording}>
                                ▶️ {t('startRoute')}
                            </button>
                        ) : (
                            <button className="btn btn-danger" onClick={stopRecording}>
                                ⏹️ {t('stopRecording')}
                            </button>
                        )}
                    </div>

                    {!isRecording && (
                        <button className="btn btn-secondary" onClick={onBack}>
                            ← {t('backToSetup')}
                        </button>
                    )}
                </div>
            );
        }

        // ========================================
        // PROCESSING SCREEN
        // ========================================
        function ProcessingScreen({ recording, config, onComplete, t, language }) {
            const [currentStep, setCurrentStep] = useState(0);
            const steps = [
                { key: 'video', label: t('videoRecorded') },
                { key: 'gps', label: t('gpsTracked') },
                { key: 'transcription', label: t('transcribing') },
                { key: 'analysis', label: t('analyzing') },
                { key: 'manifesto', label: t('generatingManifesto') },
                { key: 'image', label: t('creatingImage') }
            ];

            useEffect(() => {
                const processSteps = async () => {
                    // Step 0-1: Video and GPS (already done)
                    setCurrentStep(2);
                    
                    // Step 2: Transcription
                    let transcription = "Sem transcrição disponível (funcionalidade de áudio em desenvolvimento).";
                    
                    // Try to get transcription from video blob
                    if (recording.audioTranscription) {
                        transcription = recording.audioTranscription;
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // Step 3: Analysis (based on transcription)
                    setCurrentStep(3);
                    const analysis = {
                        senses: { visual: 5, auditory: 5, tactile: 5, olfactory: 5, spatial: 5 },
                        problems: []
                    };
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // Step 4: Manifesto generation (using REAL transcription)
                    setCurrentStep(4);
                    const manifesto = await generateManifesto(config, transcription, analysis, language);
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // Step 5: Image generation
                    setCurrentStep(5);
                    const manifestoImage = generateManifestoImage(manifesto, config);
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    setCurrentStep(6);
                    
                    onComplete({
                        transcription,
                        analysis,
                        manifesto: {
                            ...manifesto,
                            image: manifestoImage
                        }
                    });
                };

                processSteps();
            }, []);

            return (
                <div className="content">
                    <h2 style={{ marginBottom: '20px' }}>{t('processing')}</h2>
                    
                    <div className="processing-steps">
                        {steps.map((step, index) => (
                            <div 
                                key={step.key} 
                                className={`processing-step ${
                                    index < currentStep ? 'done' : 
                                    index === currentStep ? 'active' : 'pending'
                                }`}
                            >
                                {index < currentStep ? '✅' : 
                                 index === currentStep ? <div className="spinner" /> : '⏳'}
                                <span>{step.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ========================================
        // MANIFESTO GENERATION
        // ========================================
        async function generateManifesto(config, transcription, analysis, language) {
            const profile = PROFILES.find(p => p.id === config.profile);
            
            // Build prompt for Claude API
            const prompt = `Você é um especialista em wayfinding e acessibilidade. Analise esta narração de um percurso feito sob a perspectiva de um perfil de empatia específico.

**PERFIL DE EMPATIA:**
${profile.emoji} ${profile.name}

Como percebe: ${profile.howPerceives}
Onde falha: ${profile.whereFails}
O que observar: ${profile.whatToObserve}

**ESPAÇO ANALISADO:**
Tipologia: ${config.spaceType}
Nome: ${config.spaceName}
Localização: ${config.location}

**NARRAÇÃO DO UTILIZADOR:**
${transcription}

**INSTRUÇÕES:**
Gere um manifesto crítico em formato JSON com:
1. "sentences": array de 4-6 frases curtas descrevendo APENAS os problemas mencionados na narração
2. "metadata": objeto com:
   - "diagnosis": texto de 80-120 palavras resumindo os problemas REAIS observados
   - "concepts": array de 3 conceitos de wayfinding aplicados
   - "stageFails": qual etapa falha (Orientation/Route Decision/Route Monitoring/Destination Recognition)
   - "lynchElement": elemento de Kevin Lynch ausente (Paths/Edges/Districts/Nodes/Landmarks)
   - "minimalProposal": proposta concreta baseada nos problemas OBSERVADOS
   - "severityLevel": "Baixo" | "Médio" | "Alto"

IMPORTANTE: Baseie-se APENAS no que foi narrado. Se a narração não menciona problemas, o manifesto deve refletir uma experiência positiva. Não invente problemas que não foram mencionados.

Responda APENAS com JSON válido, sem markdown.`;

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_CONFIG.ANTHROPIC_API_KEY,
                        "anthropic-version": "2023-06-01"
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 2000,
                        messages: [
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                const resultText = data.content[0].text;
                
                // Parse JSON response
                const manifestoData = JSON.parse(resultText);
                return manifestoData;
                
            } catch (error) {
                console.error('Error generating manifesto:', error);
                
                // Fallback: analyze transcription locally
                return generateLocalManifesto(transcription, profile, config);
            }
        }
        
        // Fallback function for local analysis
        function generateLocalManifesto(transcription, profile, config) {
            const hasProblems = transcription.toLowerCase().includes('problema') || 
                               transcription.toLowerCase().includes('difícil') ||
                               transcription.toLowerCase().includes('confuso');
            
            if (!hasProblems && transcription.length < 50) {
                return {
                    sentences: [
                        "A narração não identificou problemas específicos de wayfinding.",
                        "O percurso aparenta ter sido concluído sem obstáculos significativos.",
                        "Recomenda-se nova análise com observação mais detalhada."
                    ],
                    metadata: {
                        diagnosis: "Sem dados suficientes na narração para identificar problemas específicos de wayfinding. Análise incompleta.",
                        concepts: ["Observação empírica", "Análise de percurso"],
                        stageFails: "N/A - Dados insuficientes",
                        lynchElement: "N/A - Dados insuficientes",
                        minimalProposal: "Repetir análise com narração mais detalhada dos problemas encontrados.",
                        severityLevel: "Baixo"
                    }
                };
            }
            
            return {
                sentences: [
                    `Durante o percurso em ${config.spaceName}, foram observadas as seguintes condições:`,
                    `A perspectiva do perfil ${profile.name} revela necessidades específicas de orientação.`,
                    `A narração documentou as experiências reais encontradas no espaço.`,
                    `Análise baseada nos 5 sentidos e nas características do perfil de empatia.`
                ],
                metadata: {
                    diagnosis: `Análise do percurso realizado em ${config.spaceName} sob a perspectiva de ${profile.name}. Baseado na narração fornecida pelo utilizador durante a gravação.`,
                    concepts: ["Empatia espacial", "Wayfinding adaptativo", "Análise sensorial"],
                    stageFails: "A determinar com base na narração",
                    lynchElement: "A determinar com base na observação",
                    minimalProposal: "Análise detalhada baseada na transcrição completa da narração.",
                    severityLevel: "Médio"
                }
            };
        }

        async function uploadVideoToDrive(videoBlob, config, user) {
            const fileName = `WayWalker_${config.spaceName}_${new Date().toISOString()}.webm`;
            
            const metadata = {
                name: fileName,
                mimeType: 'video/webm'
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', videoBlob);

            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${await getGoogleAccessToken()}`
                    },
                    body: form
                });

                const data = await response.json();
                return `https://drive.google.com/file/d/${data.id}/view`;
            } catch (error) {
                console.error('Error uploading video:', error);
                return null;
            }
        }

        async function uploadManifestoPDF(manifestoData, config, user) {
            // Generate PDF using jsPDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Add content
            doc.setFontSize(20);
            doc.text('WayWalker Manifesto', 20, 20);
            
            doc.setFontSize(12);
            doc.text(`Perfil: ${config.profileName}`, 20, 40);
            doc.text(`Espaço: ${config.spaceName}`, 20, 50);
            doc.text(`Localização: ${config.location}`, 20, 60);
            
            doc.setFontSize(10);
            let y = 80;
            manifestoData.sentences.forEach(sentence => {
                const lines = doc.splitTextToSize(sentence, 170);
                doc.text(lines, 20, y);
                y += lines.length * 7;
            });

            const pdfBlob = doc.output('blob');
            
            const fileName = `WayWalker_Manifesto_${config.spaceName}_${new Date().toISOString()}.pdf`;
            
            const metadata = {
                name: fileName,
                mimeType: 'application/pdf'
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', pdfBlob);

            try {
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${await getGoogleAccessToken()}`
                    },
                    body: form
                });

                const data = await response.json();
                return `https://drive.google.com/file/d/${data.id}/view`;
            } catch (error) {
                console.error('Error uploading PDF:', error);
                return null;
            }
        }

        // ========================================
        function ReviewScreen({ processing, config, onExport, onPublish, t, user }) {
            const [isPublishing, setIsPublishing] = useState(false);

            const handlePublish = async () => {
                setIsPublishing(true);
                
                // Simulate publishing
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const urls = {
                    mapUrl: `https://www.google.com/maps/d/u/0/viewer?mid=${API_CONFIG.GOOGLE_MYMAPS_ID}`,
                    videoUrl: 'https://drive.google.com/demo-video',
                    pdfUrl: 'https://drive.google.com/demo-manifesto.pdf'
                };
                
                onPublish(urls);
            };

            return (
                <div className="content">
                    <h2 style={{ marginBottom: '20px' }}>{t('reviewTitle')}</h2>
                    
                    {processing.transcription && processing.transcription.length > 20 && (
                        <div style={{ 
                            background: '#f8f9fa', 
                            padding: '20px', 
                            borderRadius: '10px', 
                            marginBottom: '20px',
                            border: '2px solid #e0e0e0'
                        }}>
                            <h3 style={{ marginBottom: '10px', color: '#667eea' }}>🎤 Transcrição da Narração</h3>
                            <p style={{ lineHeight: '1.7', color: '#555' }}>{processing.transcription}</p>
                        </div>
                    )}
                    
                    <div className="manifesto">
                        <h3>{t('manifesto')}</h3>
                        {processing.manifesto.sentences.map((sentence, i) => (
                            <p key={i}>{sentence}</p>
                        ))}
                    </div>

                    {processing.manifesto.image && (
                        <img 
                            src={processing.manifesto.image} 
                            alt="Manifesto" 
                            className="manifesto-image"
                        />
                    )}

                    <div className="metadata-grid">
                        <div className="metadata-item">
                            <strong>{t('diagnosis')}</strong>
                            {processing.manifesto.metadata.diagnosis}
                        </div>
                        <div className="metadata-item">
                            <strong>{t('conceptsApplied')}</strong>
                            {processing.manifesto.metadata.concepts.join(', ')}
                        </div>
                        <div className="metadata-item">
                            <strong>{t('stageFails')}</strong>
                            {processing.manifesto.metadata.stageFails}
                        </div>
                        <div className="metadata-item">
                            <strong>{t('lynchElement')}</strong>
                            {processing.manifesto.metadata.lynchElement}
                        </div>
                        <div className="metadata-item">
                            <strong>{t('minimalProposal')}</strong>
                            {processing.manifesto.metadata.minimalProposal}
                        </div>
                        <div className="metadata-item">
                            <strong>{t('severityLevel')}</strong>
                            <span className={`badge badge-${
                                processing.manifesto.metadata.severityLevel === 'Alto' ? 'red' : 
                                processing.manifesto.metadata.severityLevel === 'Medio' ? 'yellow' : 'green'
                            }`}>
                                {processing.manifesto.metadata.severityLevel}
                            </span>
                        </div>
                    </div>

                    <button className="btn btn-secondary" onClick={onExport}>
                        💾 {t('exportJSON')}
                    </button>

                    <button 
                        className="btn btn-primary" 
                        onClick={handlePublish}
                        disabled={isPublishing}
                    >
                        {isPublishing ? '⏳ Publishing...' : `🌍 ${t('publishNow')}`}
                    </button>
                </div>
            );
        }

        // ========================================
        // SUCCESS SCREEN
        // ========================================
        function SuccessScreen({ urls, onNewAnalysis, t }) {
            return (
                <div className="content">
                    <div style={{ textAlign: 'center', padding: '20px 0' }}>
                        <div style={{ fontSize: '5rem', marginBottom: '20px' }}>✅</div>
                        <h2 style={{ marginBottom: '10px' }}>{t('successTitle')}</h2>
                        <p style={{ color: '#666', marginBottom: '30px' }}>
                            {t('successMessage')}
                        </p>
                    </div>

                    <div className="success-links">
                        <a href={urls.mapUrl} target="_blank" rel="noopener noreferrer" className="success-link">
                            <div className="icon">🗺️</div>
                            <div>
                                <strong>{t('viewOnMaps')}</strong>
                                <div style={{ fontSize: '0.85rem', color: '#666' }}>Google My Maps Atlas</div>
                            </div>
                        </a>

                        <a href={urls.videoUrl} target="_blank" rel="noopener noreferrer" className="success-link">
                            <div className="icon">📹</div>
                            <div>
                                <strong>{t('videoOnDrive')}</strong>
                                <div style={{ fontSize: '0.85rem', color: '#666' }}>Google Drive Folder</div>
                            </div>
                        </a>

                        <a href={urls.pdfUrl} target="_blank" rel="noopener noreferrer" className="success-link">
                            <div className="icon">📄</div>
                            <div>
                                <strong>{t('manifestoPDF')}</strong>
                                <div style={{ fontSize: '0.85rem', color: '#666' }}>Download PDF Report</div>
                            </div>
                        </a>
                    </div>

                    <button className="btn btn-primary" onClick={onNewAnalysis}>
                        ➕ {t('newAnalysisBtn')}
                    </button>
                </div>
            );
        }

        // ========================================
        // RENDER APP
        // ========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WayWalkerApp />);
        
        // ========================================
        // SERVICE WORKER REGISTRATION (PWA)
        // ========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('❌ Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
